<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=1024, initial-scale=1, user-scalable=no">
<title>rlight — Portaria Autônoma v7.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#07070f;
  --glass:rgba(255,255,255,0.042);
  --glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.082);
  --border-strong:rgba(255,255,255,0.15);

  --green:#30D158;
  --yellow:#FFD60A;
  --blue:#0A84FF;
  --red:#FF453A;
  --orange:#FF9F0A;
  --purple:#BF5AF2;
  --cyan:#64D2FF;

  --t1:rgba(255,255,255,0.92);
  --t2:rgba(255,255,255,0.55);
  --t3:rgba(255,255,255,0.28);
  --t4:rgba(255,255,255,0.12);

  --f1:'DM Sans',sans-serif;
  --f2:'DM Mono',monospace;

  --W:600px;
  --H:1024px;
}

html,body{
  width:var(--W);height:var(--H);
  overflow:hidden;background:var(--bg);
  font-family:var(--f1);color:var(--t1);
  user-select:none;
}

/* ═══════════════════════ BACKGROUND ═══════════════════════ */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.18;transition:background 1.4s ease, opacity 1.4s ease}
#b1{width:500px;height:500px;bottom:-100px;left:-100px;background:var(--green);animation:float1 10s ease-in-out infinite alternate}
#b2{width:420px;height:420px;top:-80px;right:-80px;background:var(--blue);animation:float2 14s ease-in-out infinite alternate}
.noise{position:absolute;inset:0;opacity:0.035;pointer-events:none}
.glass-layer{position:absolute;inset:0;backdrop-filter:blur(40px) saturate(1.8);background:rgba(7,7,15,0.55)}

@keyframes float1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.08)}}
@keyframes float2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-35px,25px) scale(0.94)}}

/* ═══════════════════════ HUD ═══════════════════════ */
#hud{
  position:fixed;top:0;left:0;right:0;height:64px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  backdrop-filter:blur(20px) saturate(1.6);
  background:rgba(7,7,15,0.5);
  border-bottom:1px solid var(--border);
  transition:opacity 0.5s;
}
#hud.hide{opacity:0;pointer-events:none}
.logo{font-size:12px;font-weight:600;letter-spacing:4px;color:var(--t3);text-transform:uppercase}
.state-lbl{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--t3);text-transform:uppercase;position:absolute;left:50%;transform:translateX(-50%)}
.hud-r{display:flex;align-items:center;gap:14px}

/* ── Status dot — fix #2 ── */
.online-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  transition:background 0.6s,box-shadow 0.6s,animation 0s;
}
/* green = online → pulse */
.online-dot.online{animation:pulse-dot 2s ease-in-out infinite}
/* yellow = offline/degraded → solid, no pulse */
.online-dot.offline{background:var(--yellow);box-shadow:0 0 6px rgba(255,214,10,0.5);animation:none}

/* ── Clock — fix #1: tabular nums, fixed-width slots ── */
.clock-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.clock{
  display:flex;align-items:baseline;gap:0;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
  line-height:1;
}
.clock .hm{
  font-size:26px;font-weight:200;letter-spacing:-0.5px;color:var(--t1);
  font-variant-numeric:tabular-nums;
  min-width:3.8ch;text-align:right;
}
.clock .sep{
  font-size:26px;font-weight:200;color:var(--t2);
  animation:blink 1s step-end infinite;
  width:0.55ch;text-align:center;
}
/* Seconds — improved: smaller, badge-style */
.clock .sec-wrap{
  display:flex;align-items:flex-end;padding-bottom:2px;margin-left:3px;
}
.clock .sec{
  font-size:13px;font-weight:500;color:var(--t3);
  font-variant-numeric:tabular-nums;
  min-width:2ch;letter-spacing:0;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:5px;padding:1px 4px;
  transition:color 0.2s;
}
.date-str{font-size:10px;font-weight:500;letter-spacing:1.2px;color:var(--t3);text-transform:uppercase;text-align:right}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(1.3)}}

/* ═══════════════════════ SCREENS ═══════════════════════ */
#app{position:fixed;inset:0;top:64px;z-index:10}
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 36px;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s ease;
}
.screen.active{opacity:1;pointer-events:all}

/* ═══════════════════════ NAV (demo) ═══════════════════════ */
#nav{
  position:fixed;bottom:0;left:0;right:0;height:48px;z-index:200;
  display:flex;align-items:center;justify-content:flex-start;gap:5px;
  background:rgba(7,7,15,0.9);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);padding:0 10px;overflow-x:auto;
}
.nav-btn{
  padding:6px 9px;font-size:9px;font-weight:600;letter-spacing:0.6px;
  border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--t2);cursor:pointer;
  white-space:nowrap;transition:all 0.2s;text-transform:uppercase;flex-shrink:0;
}
.nav-btn:hover{background:var(--glass);color:var(--t1);border-color:var(--border-strong)}
.nav-btn.active{background:rgba(255,255,255,0.08);color:var(--t1);border-color:var(--border-strong)}

/* ═══════════════════════ SHARED COMPONENTS ═══════════════════════ */
.glass-card{
  background:rgba(255,255,255,0.045);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(16px);
  padding:22px 28px;
}
.glass-card.success{background:rgba(48,209,88,0.06);border-color:rgba(48,209,88,0.22)}
.glass-card.warning{background:rgba(255,159,10,0.07);border-color:rgba(255,159,10,0.22)}
.glass-card.error{background:rgba(255,69,58,0.06);border-color:rgba(255,69,58,0.22)}
.glass-card.purple{background:rgba(191,90,242,0.07);border-color:rgba(191,90,242,0.22)}
.glass-card.blue{background:rgba(10,132,255,0.06);border-color:rgba(10,132,255,0.22)}

.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:22px;
  font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;
  border:1px solid;
}
.pill.green{color:var(--green);border-color:rgba(48,209,88,0.35);background:rgba(48,209,88,0.1)}
.pill.yellow{color:var(--yellow);border-color:rgba(255,214,10,0.35);background:rgba(255,214,10,0.1)}
.pill.blue{color:var(--blue);border-color:rgba(10,132,255,0.35);background:rgba(10,132,255,0.1)}
.pill.red{color:var(--red);border-color:rgba(255,69,58,0.35);background:rgba(255,69,58,0.1)}
.pill.orange{color:var(--orange);border-color:rgba(255,159,10,0.35);background:rgba(255,159,10,0.1)}
.pill.purple{color:var(--purple);border-color:rgba(191,90,242,0.35);background:rgba(191,90,242,0.1)}

.prog-track{width:100%;height:2px;border-radius:1px;background:rgba(255,255,255,0.06);overflow:hidden}
.prog-bar{height:100%;border-radius:1px;transition:width 1s linear}
.prog-bar.green{background:var(--green)}
.prog-bar.yellow{background:var(--yellow)}
.prog-bar.blue{background:var(--blue)}
.prog-bar.orange{background:var(--orange)}

.prog-footer{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px 36px 18px;
  display:flex;flex-direction:column;gap:9px;
}
.prog-footer .label{font-size:11px;font-weight:500;letter-spacing:0.5px;color:var(--t3);text-align:center}

/* Arrows */
.arrow-svg{width:72px;height:72px}
.arrow-right{animation:pulse-r 1.1s ease-in-out infinite alternate}
.arrow-left{animation:pulse-l 1.1s ease-in-out infinite alternate}
.arrow-down{animation:pulse-d 1.1s ease-in-out infinite alternate}
.arrow-diag-bl{animation:pulse-diag-bl 1.2s ease-in-out infinite alternate;transform-origin:center}
/* #4 fix — arrow points bottom-left */
@keyframes pulse-diag-bl{0%{transform:translate(0,0)}100%{transform:translate(-9px,9px)}}
@keyframes pulse-r{0%{transform:translateX(0)}100%{transform:translateX(10px)}}
@keyframes pulse-l{0%{transform:translateX(0)}100%{transform:translateX(-10px)}}
@keyframes pulse-d{0%{transform:translateY(0)}100%{transform:translateY(10px)}}

@keyframes pop-in{
  0%{transform:scale(0.3);opacity:0}
  65%{transform:scale(1.06);opacity:1}
  100%{transform:scale(1);opacity:1}
}
@keyframes float-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.6}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px center}100%{background-position:400px center}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes step-in{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes fade-rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.ios-spinner{
  width:42px;height:42px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--t1);
  animation:spin 0.85s linear infinite;
}

/* Radial timer */
.radial-sm{position:absolute;top:14px;right:18px;width:56px;height:56px}
.radial-sm svg{width:56px;height:56px;transform:rotate(-90deg)}
.circ-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:2.5}
.circ-fill{fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.circ-fill.green{stroke:var(--green)}
.circ-fill.blue{stroke:var(--blue)}

/* ═══════════════════════ 1 — IDLE (fix #3) ═══════════════════════ */
/* Portrait: center, big brand name in green uppercase, live clock overlay */
#s-IDLE{justify-content:center;gap:0}
.idle-brand{
  font-size:96px;font-weight:700;letter-spacing:6px;
  color:var(--green);text-transform:uppercase;
  line-height:1;
  opacity:0.88;
  text-shadow:0 0 80px rgba(48,209,88,0.25);
}
.idle-tagline{
  font-size:12px;font-weight:400;letter-spacing:4px;color:var(--t3);
  text-transform:uppercase;margin-top:12px;text-align:center;
}
.idle-clock-block{
  position:absolute;bottom:80px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0.35;
}
.idle-clock-hm{font-size:52px;font-weight:200;color:var(--t1);letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.idle-clock-date{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--t3);text-transform:uppercase}

/* ═══════════════════════ 2 — AWAKE (fix #4) ═══════════════════════ */
#s-AWAKE{justify-content:flex-start;padding-top:22px;gap:0}

.awake-address-block{
  width:100%;text-align:center;
  animation:fade-rise 0.5s ease both;
  margin-bottom:24px;
}
/* Larger address — fix #4 */
.awake-addr-main{
  font-size:22px;font-weight:600;color:var(--t1);
  letter-spacing:-0.3px;line-height:1.3;
}
.awake-addr-cep{
  font-size:14px;font-weight:400;color:var(--t2);margin-top:4px;
}
.awake-residents-lbl{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:12px}
.awake-residents{font-size:20px;font-weight:600;color:var(--green);margin-top:4px;letter-spacing:-0.3px}

.awake-divider{width:100%;height:1px;background:var(--border);margin:0}

.awake-scan-block{
  width:100%;text-align:center;padding:26px 0;
  animation:fade-rise 0.5s 0.08s ease both;
}
.awake-main-title{font-size:28px;font-weight:700;letter-spacing:0.5px;color:var(--t1);line-height:1.15}
/* fix #4 — updated subtitle text */
.awake-sub{font-size:15px;color:var(--t2);margin-top:10px;line-height:1.5;max-width:340px;margin-left:auto;margin-right:auto}

.awake-arrow-zone{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  animation:fade-rise 0.5s 0.16s ease both;
  flex:1;justify-content:center;
}
/* fix #4 — bottom-left glow */
.qr-glow{
  position:relative;display:inline-block;
  filter:drop-shadow(0 0 28px rgba(255,214,10,0.32));
}
.arrow-lbl{font-size:12px;font-weight:600;letter-spacing:1.8px;color:var(--yellow);opacity:0.85;text-transform:uppercase}

.shimmer-strip{
  position:absolute;left:0;right:0;height:3px;bottom:54px;
  background:linear-gradient(90deg, transparent 0%, var(--yellow) 50%, transparent 100%);
  background-size:400px 100%;
  animation:shimmer 1.6s linear infinite;
  opacity:0;transition:opacity 0.4s;
}
.shimmer-strip.active{opacity:1}

/* ═══════════════════════ 4 — AUTHORIZED ═══════════════════════ */
#s-AUTHORIZED{gap:0}
.auth-circle{
  width:160px;height:160px;border-radius:50%;
  background:rgba(48,209,88,0.12);
  border:2px solid var(--green);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 70px rgba(48,209,88,0.22);
  animation:pop-in 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
}
.auth-check{width:72px;height:72px;color:var(--green)}
.auth-title{
  font-size:32px;font-weight:700;letter-spacing:1px;color:var(--green);margin-top:22px;
  animation:fade-rise 0.4s 0.38s ease both;opacity:0;animation-fill-mode:forwards;
}
.auth-carrier{
  font-size:12px;font-weight:600;letter-spacing:1.8px;color:var(--t3);margin-top:6px;text-transform:uppercase;
  animation:fade-rise 0.4s 0.58s ease both;opacity:0;animation-fill-mode:forwards;
}
.auth-instruction{
  display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:36px;
  animation:fade-rise 0.4s 0.72s ease both;opacity:0;animation-fill-mode:forwards;
}
.auth-push{font-size:22px;font-weight:500;color:var(--t1)}
.auth-sub{font-size:14px;color:var(--t2)}

/* ═══════════════════════ 5 — INSIDE_WAIT ═══════════════════════ */
#s-INSIDE_WAIT{}
.inside-icon{font-size:68px;animation:float-bob 2.2s ease-in-out infinite;line-height:1}
.inside-title{font-size:32px;font-weight:600;color:var(--t1);margin-top:16px;text-align:center}
.inside-sub{font-size:16px;color:var(--t2);margin-top:6px}
.glass-card weight-card{margin-top:28px;width:320px;text-align:center}
.weight-lbl{font-size:11px;font-weight:600;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase}
.weight-val{font-size:80px;font-weight:200;color:var(--t1);line-height:1;margin-top:6px;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.weight-bar-wrap{margin-top:14px}

/* ═══════════════════════ 6 — DELIVERING ═══════════════════════ */
.glass-card success deliv-card{text-align:center;padding:28px 52px}
.deliv-lbl{font-size:11px;font-weight:600;letter-spacing:2.5px;color:var(--green);text-transform:uppercase}
.deliv-weight{font-size:80px;font-weight:200;color:var(--green);letter-spacing:-2px;line-height:1;margin-top:8px;font-variant-numeric:tabular-nums}
.deliv-inst{text-align:center;margin-top:28px}
.deliv-inst-title{font-size:30px;font-weight:600;color:var(--t1);margin-top:10px}
.deliv-inst-sub{font-size:16px;color:var(--t2);margin-top:6px}
.deliv-warning{display:inline-flex;align-items:center;gap:8px;margin-top:24px}
